[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.29"
evm_version = "cancun"
optimizer = true
optimizer_runs = 250
via_ir = true
bytecode_hash = "none"
remappings = [
    "@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable-4.9.4/",
    "forge-std/=lib/forge-std/src/",
]
